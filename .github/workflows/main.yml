name: Build

on:
  workflow_dispatch:
  
permissions:
  contents: write
  
jobs:
  build:
    name: "Build"
    runs-on: ubuntu-latest
    steps:
    - name: Clone repository
      uses: actions/checkout@v6
      with:
        submodules: recursive
        fetch-depth: 1
    - name: Validation
      uses: gradle/actions/wrapper-validation@v6
      
    - name: Java setup
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '17'
    - name: Gradle Permission
      run: chmod 755 ./*
    - name: Restore cache
      uses: actions/cache@v5
      with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

          restore-keys: |
            ${{ runner.os }}-gradle-

    - name: Build
      run: ./gradlew assembleDebug --info --stacktrace | grep -A 50 "Resource compilation failed"

    - name: Store app-arm64-v8a-debug
      uses: actions/upload-artifact@v7
      with:
        name: termux-x11-arm64-v8a-debug
        path: ./app/build/outputs/apk/debug/*.apk
    
    - name: Store app-universal-debug
      uses: actions/upload-artifact@v7
      with:
        name: termux-x11-universal-debug
        path: ./*

    
